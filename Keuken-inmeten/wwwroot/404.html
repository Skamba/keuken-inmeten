<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keuken-inmeten</title>
    <base href="/" />
</head>

<body>
    <script>
        (function () {
            const baseHref = document.querySelector("base")?.getAttribute("href") || "/";
            const requestPath = window.location.pathname + window.location.search + window.location.hash;

            sessionStorage.setItem("github-pages-path", requestPath);
            window.location.replace(baseHref);
        })();
    </script>
</body>

</html>
