<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keuken-inmeten</title>
    <base href="/" />
    <script>
        (function () {
            // Apply saved theme or detect system preference before first paint
            var saved = localStorage.getItem("keuken-theme");
            var theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-bs-theme", theme);
        })();
        (function () {
            const savedPath = sessionStorage.getItem("github-pages-path");
            if (!savedPath) {
                return;
            }

            sessionStorage.removeItem("github-pages-path");
            history.replaceState(null, "", savedPath);
        })();

        window.keukenTheme = {
            toggle: function () {
                var current = document.documentElement.getAttribute("data-bs-theme");
                var next = current === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-bs-theme", next);
                localStorage.setItem("keuken-theme", next);
                return next;
            },
            get: function () {
                return document.documentElement.getAttribute("data-bs-theme") || "light";
            }
        };

        window.keukenShare = {
            shareUrl: async function (url, title, text) {
                if (navigator.share && (!navigator.canShare || navigator.canShare({ url: url }))) {
                    try {
                        await navigator.share({ url: url, title: title, text: text });
                        return "shared";
                    } catch (error) {
                        if (error && error.name === "AbortError") {
                            return "cancelled";
                        }
                    }
                }

                try {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(url);
                        return "copied";
                    }
                } catch {
                    // Fall back to execCommand below.
                }

                const input = document.createElement("textarea");
                input.value = url;
                input.setAttribute("readonly", "");
                input.style.position = "fixed";
                input.style.opacity = "0";
                document.body.appendChild(input);
                input.select();
                input.setSelectionRange(0, input.value.length);
                const copied = document.execCommand("copy");
                document.body.removeChild(input);
                return copied ? "copied" : "unsupported";
            }
        };
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Keuken-inmeten.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Er is een onverwachte fout opgetreden.
        <a href="." class="reload">Herladen</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
